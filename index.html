      // 2. Zaktualizowana funkcja startGame (używa supabaseClient)
      async function startGame() {
        const { data: players } = await supabaseClient
          .from("players")
          .select("id")
          .eq("room_id", myRoom);

        if (players.length < 3) {
          return alert("Potrzebujecie co najmniej 3 graczy!");
        }

        const impostor = players[Math.floor(Math.random() * players.length)].id;
        const set = dictionary[Math.floor(Math.random() * dictionary.length)];

        await supabaseClient
          .from("rooms")
          .update({
            status: "playing",
            word_specific: set.spec,
            word_category: set.cat,
            impostor_id: impostor,
          })
          .eq("id", myRoom);
      }

      // 3. Pamiętaj, żeby w joinGame, setupRealtime i fetchPlayers
      // też zmienić 'supabase' na 'supabaseClient'!

      function showWord(roomData) {
        document.getElementById("lobby-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        const display = document.getElementById("word-display");
        const hint = document.getElementById("role-hint");

        if (roomData.impostor_id === myId) {
          display.innerText = roomData.word_category;
          hint.innerText =
            "Jesteś Impostorem! Twoje słowo to ogólna KATEGORIA.";
          display.style.color = "#f44336";
        } else {
          display.innerText = roomData.word_specific;
          hint.innerText = "Jesteś Cywilem. Masz konkretne słowo.";
          display.style.color = "#4caf50";
        }
      }
    </script>
  </body>
</html>
