<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Impostor Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="card">
      <h1>Impostor</h1>

      <div id="setup-screen">
        <input type="text" id="player-name" placeholder="Twoje imię" />
        <input type="text" id="room-id" placeholder="Kod pokoju (np. 123)" />
        <input
          type="password"
          id="room-password"
          placeholder="Hasło do pokoju"
        />
        <button onclick="joinGame(true)">Stwórz pokój</button>
        <button onclick="joinGame(false)">Dołącz do pokoju</button>
      </div>

      <div id="lobby-screen" class="hidden">
        <h3>Pokój: <span id="display-room-id"></span></h3>
        <p>Gracze w lobby:</p>
        <ul id="player-list"></ul>
        <button id="start-btn" class="hidden" onclick="startGame()">
          ROZPOCZNIJ GRĘ
        </button>
      </div>

      <div id="game-screen" class="hidden">
        <h3>Twoje tajne słowo:</h3>
        <div id="word-display" class="word-box">???</div>
        <p id="role-hint"></p>

        <button id="next-round-btn" class="hidden" onclick="startGame()">
          NASTĘPNA RUNDA
        </button>

        <br />
        <button onclick="leaveGame()">Wyjdź do menu</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
